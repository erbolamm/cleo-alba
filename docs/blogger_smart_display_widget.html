<style>
    #smart-display-widget {
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        background: linear-gradient(135deg, #005fa9 0%, #00467b 100%);
        color: #ffffff;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 95, 169, 0.25);
    }

    #smart-display-widget .sd-dot {
        width: 6px;
        height: 6px;
        background: #5ecef5;
        border-radius: 50%;
        position: absolute;
        top: 10px;
        right: 10px;
        animation: sd-pulse 2s infinite;
    }

    #smart-display-widget .sd-text {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.5;
        white-space: pre-line;
        max-width: 100%;
        color: #ffffff;
    }

    #smart-display-widget .sd-idle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
        font-weight: 400;
        font-style: italic;
    }

    @keyframes sd-pulse {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.3;
        }
    }
</style>
<div id="smart-display-widget">
    <span class="sd-dot"></span>
    <div class="sd-text sd-idle">apliarte.com</div>
</div>
<script>
    (function () {
        var DISPLAY_API_URL = 'https://display.apliarte.com/api/display';

        function updateDisplay() {
            fetch(DISPLAY_API_URL)
                .then(function (r) { return r.json(); })
                .then(function (d) {
                    var el = document.querySelector('#smart-display-widget .sd-text');
                    if (!el) return;
                    if (!d.text || d.state === 'idle') {
                        el.className = 'sd-text sd-idle';
                        el.textContent = 'apliarte.com';
                    } else {
                        el.className = 'sd-text';
                        el.textContent = d.text;
                    }
                })
                .catch(function () { });
        }

        updateDisplay();
        setInterval(updateDisplay, 3000);
    })();
</script>
