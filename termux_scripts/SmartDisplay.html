<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>ApliBot Smart Display PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            transition: background 0.7s, backdrop-filter 0.5s;
            text-align: center;
        }

        /* Capa de fondo para la última foto */
        #bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            transition: opacity 1s, filter 1s;
            z-index: -1;
            filter: grayscale(50%) blur(4px);
        }

        #content {
            opacity: 0;
            transition: opacity 0.5s;
            transform: scale(0.9);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Reloj (Modo Idle) */
        #clock-container {
            position: absolute;
            transition: opacity 0.5s;
        }

        #time {
            font-size: 8rem;
            font-weight: 200;
            letter-spacing: 5px;
        }

        #date {
            font-size: 2rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Elementos Activos */
        .emoji {
            font-size: 10rem;
            margin-bottom: 20px;
        }

        .text {
            font-size: 3rem;
            max-width: 90vw;
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        /* Animaciones */
        @keyframes pulse {
            0% {
                opacity: 0.5;
                transform: scale(0.95);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }

            100% {
                opacity: 0.5;
                transform: scale(0.95);
            }
        }

        /* Animación para el bot hablando, imitando forma de onda de boca */
        @keyframes talk {
            0% {
                transform: scale(1) translateY(0);
                filter: drop-shadow(0 0 10px #0ff);
            }

            25% {
                transform: scale(1.1) translateY(-10px);
                filter: drop-shadow(0 0 30px #0ff);
            }

            50% {
                transform: scale(0.95) translateY(5px);
                filter: drop-shadow(0 0 15px #0ff);
            }

            75% {
                transform: scale(1.05) translateY(-5px);
                filter: drop-shadow(0 0 25px #0ff);
            }

            100% {
                transform: scale(1) translateY(0);
                filter: drop-shadow(0 0 10px #0ff);
            }
        }

        @keyframes flash {
            0% {
                background: #fff;
            }

            100% {
                background: transparent;
            }
        }

        /* Estados */
        body.idle #clock-container {
            opacity: 1;
        }

        body.idle #bg-image {
            opacity: 0.3;
        }

        body.idle #content {
            opacity: 0;
            pointer-events: none;
        }

        body.active #clock-container {
            opacity: 0;
            pointer-events: none;
        }

        body.active #bg-image {
            opacity: 0.1;
            filter: grayscale(80%) blur(10px);
        }

        body.active #content {
            opacity: 1;
            transform: scale(1);
        }

        body.tts .emoji {
            animation: talk 0.4s infinite alternate;
        }

        body.recording .emoji {
            animation: pulse 1s infinite;
            filter: drop-shadow(0 0 20px red);
        }

        body.foto::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fff;
            animation: flash 0.5s ease-out forwards;
            z-index: 9999;
            pointer-events: none;
        }

        /* Tap to fullscreen */
        #fs-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        #fs-btn:hover {
            opacity: 1;
        }
    </style>
</head>

<body id="bg" class="idle">
    <div id="bg-image"></div>
    <button id="fs-btn" onclick="document.documentElement.requestFullscreen()">📺</button>

    <div id="clock-container">
        <div id="time">00:00</div>
        <div id="date">Cargando...</div>
    </div>

    <div id="content">
        <div id="emoji" class="emoji"></div>
        <div id="text" class="text"></div>
    </div>
    <script>
        document.addEventListener('fullscreenchange', () => {
            document.getElementById('fs-btn').style.display = document.fullscreenElement ? 'none' : 'block';
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateBackground() {
            const img = new Image();
            // Solicitud absoluta a localhost:8080 para evitar conflictos de dominio file://
            img.src = 'http://localhost:8080/api/latest_photo?t=' + Math.floor(Date.now() / 10000);
            img.onload = () => {
                document.getElementById('bg-image').style.backgroundImage = 'url(' + img.src + ')';
            };
        }
        setInterval(updateBackground, 10000);
        updateBackground();

        let lastState = 'init';
        setInterval(() => {
            fetch('http://localhost:8080/api/display_state')
                .then(r => r.json())
                .then(data => {
                    let st = data.state || 'idle';
                    if (st !== lastState) {
                        lastState = st;
                        const bg = document.getElementById('bg');
                        const emoji = document.getElementById('emoji');
                        const text = document.getElementById('text');

                        bg.className = '';

                        if (st === 'idle' || st === 'stopped' || st === '') {
                            bg.classList.add('idle');
                        } else if (st.startsWith('tts:')) {
                            bg.classList.add('active', 'tts');
                            emoji.innerHTML = '🤖🗣️';
                            text.innerText = st.substring(4);
                        } else if (st === 'recording') {
                            bg.classList.add('active', 'recording');
                            emoji.innerHTML = '🎙️🔴';
                            text.innerText = 'Escuchando...';
                        } else if (st === 'foto' || st === 'selfie') {
                            bg.classList.add('active', 'foto');
                            emoji.innerHTML = '📸';
                            text.innerText = '¡Patata!';
                            setTimeout(updateBackground, 2000);
                        } else if (st === 'playing') {
                            bg.classList.add('active');
                            emoji.innerHTML = '🎵🎶';
                            text.innerText = 'Reproduciendo audio...';
                        } else if (st === 'sharing') {
                            bg.classList.add('active');
                            emoji.innerHTML = '📤';
                            text.innerText = 'Compartiendo archivo...';
                        } else if (st.startsWith('show:')) {
                            bg.classList.add('active', 'tts');
                            let content = st.substring(5);
                            if (content.length < 8 && /[\uD800-\uDBFF][\uDC00-\uDFFF]/.test(content)) {
                                emoji.innerHTML = content;
                                text.innerText = '';
                            } else {
                                emoji.innerHTML = '🤖';
                                text.innerText = content;
                            }
                        }
                    }
                })
                .catch(e => console.error(e));
        }, 300);
    </script>
</body>

</html>
