<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>P10 Smart Display</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; transition: background 0.5s; text-align: center; }
        #content { opacity: 0; transition: opacity 0.5s; transform: scale(0.9); }
        body.active #content { opacity: 1; transform: scale(1); }
        .emoji { font-size: 8rem; margin-bottom: 20px; }
        .text { font-size: 3rem; max-width: 80vw; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.5; transform: scale(0.95); } }
        body.recording .emoji { animation: pulse 1s infinite; color: red; }
        body.foto { background: #fff !important; color: #000; }
        /* Tap to fullscreen */
        #fs-btn { position: absolute; top: 10px; right: 10px; padding: 10px; background: #333; color: #ddd; border: none; border-radius: 5px; opacity: 0.3; }
    </style>
</head>
<body id="bg">
    <button id="fs-btn" onclick="document.documentElement.requestFullscreen()">📺</button>
    <div id="content">
        <div id="emoji" class="emoji"></div>
        <div id="text" class="text"></div>
    </div>
    <script>
        // Truco para esconder el botón si estamos full
        document.addEventListener('fullscreenchange', () => {
            document.getElementById('fs-btn').style.display = document.fullscreenElement ? 'none' : 'block';
        });

        let lastState = '';
        setInterval(() => {
            fetch('http://localhost:8080/api/display_state')
                .then(r => r.json())
                .then(data => {
                    if(data.state !== lastState) {
                        lastState = data.state;
                        const bg = document.getElementById('bg');
                        const emoji = document.getElementById('emoji');
                        const text = document.getElementById('text');
                        
                        bg.className = '';
                        
                        if(data.state === 'idle' || data.state === 'stopped' || data.state === '') {
                            // nothing
                        } else if(data.state.startsWith('tts:')) {
                            bg.classList.add('active');
                            emoji.innerHTML = '🤖💬';
                            text.innerText = data.state.substring(4);
                        } else if(data.state === 'recording') {
                            bg.classList.add('active', 'recording');
                            emoji.innerHTML = '🔴🎙️';
                            text.innerText = 'Escuchando...';
                        } else if(data.state === 'foto' || data.state === 'selfie') {
                            bg.classList.add('active', 'foto');
                            emoji.innerHTML = '📸';
                            text.innerText = '¡Patata!';
                            setTimeout(() => bg.classList.remove('foto'), 200);
                        } else if(data.state === 'playing') {
                            bg.classList.add('active');
                            emoji.innerHTML = '🎵🎶';
                            text.innerText = 'Reproduciendo audio...';
                        } else if(data.state === 'sharing') {
                            bg.classList.add('active');
                            emoji.innerHTML = '📤';
                            text.innerText = 'Compartiendo archivo...';
                        }
                    }
                })
                .catch(e => console.error(e));
        }, 500);
    </script>
</body>
</html>
