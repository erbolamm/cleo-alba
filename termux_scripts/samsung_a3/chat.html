<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ApliBot · Samsung A3</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --user-bg: #1e1b4b;
      --bot-bg: #0f172a;
      --green: #22c55e;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 0.6rem; }
    .avatar-dot {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .header-title { font-size: 1rem; font-weight: 600; }
    .header-sub { font-size: 0.7rem; color: var(--text2); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--green); }

    /* CHAT */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scroll-behavior: smooth;
    }
    .bubble {
      max-width: 85%;
      padding: 0.65rem 0.9rem;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .bubble.user {
      background: var(--user-bg);
      border: 1px solid var(--accent);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.typing {
      color: var(--text2);
      font-style: italic;
    }
    .bubble code {
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85em;
    }
    .bubble pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem;
      overflow-x: auto;
      margin-top: 0.4rem;
      font-size: 0.8rem;
    }

    /* INPUT */
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    #userInput {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 0.6rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #userInput:focus { border-color: var(--accent); }
    #sendBtn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* MENU DOTS */
    .menu-btn {
      background: none; border: none; color: var(--text2);
      font-size: 1.2rem; cursor: pointer; padding: 0.2rem 0.4rem;
    }
    #menuPanel {
      display: none;
      position: fixed; top: 55px; right: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem;
      z-index: 100;
      min-width: 160px;
    }
    #menuPanel.visible { display: block; }
    .menu-item {
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text);
    }
    .menu-item:hover { background: var(--border); }
    .menu-sep { border-top: 1px solid var(--border); margin: 0.3rem 0; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="avatar-dot">🤖</div>
    <div>
      <div class="header-title">ApliBot</div>
      <div class="header-sub">Samsung A3 · Groq llama-3.1</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:0.6rem">
    <div class="status-dot" id="statusDot"></div>
    <button class="menu-btn" onclick="toggleMenu()">⋮</button>
  </div>
</header>

<div id="menuPanel">
  <div class="menu-item" onclick="clearChat()">🗑 Limpiar chat</div>
  <div class="menu-sep"></div>
  <div class="menu-item" onclick="checkStatus()">📡 Estado servidor</div>
</div>

<div id="chat">
  <div class="bubble bot">¡Hola! Soy <strong>ApliBot</strong> corriendo en tu Samsung A3.<br>Estoy conectado a <code>llama-3.1-8b-instant</code> via Groq.<br>¿En qué te ayudo?</div>
</div>

<div class="input-bar">
  <input id="userInput" type="text" placeholder="Escribe un mensaje..." autocomplete="off" autofocus>
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
const API = '';  // mismo origen

// Formato mínimo markdown → HTML
function fmt(text) {
  return text
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addBubble(type, text, id) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `bubble ${type}`;
  if (id) div.id = id;
  div.innerHTML = fmt(text);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const btn   = document.getElementById('sendBtn');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  btn.disabled = true;

  addBubble('user', text);

  const typing = addBubble('bot typing', '✨ Pensando...', 'typing');

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    typing.remove();
    addBubble('bot', data.response || data.error || 'Sin respuesta');
  } catch (e) {
    typing.remove();
    addBubble('bot', `❌ Error de conexión: ${e.message}`);
  }

  btn.disabled = false;
  input.focus();
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Ping de estado
async function checkStatus() {
  hideMenu();
  try {
    const r = await fetch(`${API}/api/status`);
    const d = await r.json();
    addBubble('bot', `📡 Servidor OK · modelo: \`${d.model}\` · mensajes en sesión: ${d.messages}`);
    document.getElementById('statusDot').classList.add('online');
  } catch {
    addBubble('bot', '❌ Servidor no responde');
    document.getElementById('statusDot').classList.remove('online');
  }
}

async function clearChat() {
  hideMenu();
  await fetch(`${API}/api/clear`, { method: 'POST' }).catch(() => {});
  document.getElementById('chat').innerHTML = '';
  addBubble('bot', '🗑 Chat limpiado. ¿En qué te ayudo?');
}

function toggleMenu() {
  document.getElementById('menuPanel').classList.toggle('visible');
}
function hideMenu() {
  document.getElementById('menuPanel').classList.remove('visible');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#menuPanel') && !e.target.closest('.menu-btn')) hideMenu();
});

// Ping inicial
setTimeout(checkStatus, 800);
</script>
</body>
</html>
